<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alaidin - The AI Genie for Financial Markets</title>
    
    <!-- NO Chart.js - Using server-side Visual Agent charts -->
    
    <style>

        :root {
            /* Aladin Color Palette - Official */
            --color-forest-green: #2C8C6A;
            --color-slate-blue: #4A6C8C;
            --color-accent-red: #E54B4B;
            --color-amber: #F59E0B;
            --color-light-gray: #ECEFF1;
            --color-charcoal: #37474F;
            --color-grid-gray: #CFD8DC;
            --color-volume-gray: #90A4AE;
            
            /* Semantic mapping for backward compatibility */
            --color-bg: #ffffff;
            --color-text: var(--color-charcoal);
            --color-border: var(--color-grid-gray);
            --color-primary: var(--color-accent-red);
            --color-secondary: var(--color-volume-gray);
            --color-success: var(--color-forest-green);
            --color-danger: var(--color-accent-red);
            --color-warning: var(--color-amber);
            --color-info: var(--color-slate-blue);
            --color-light: var(--color-light-gray);
            --color-dark: var(--color-charcoal);
            
            /* Status indicators */
            --color-idle: var(--color-volume-gray);
            --color-ready: var(--color-forest-green);
            --color-processing: var(--color-amber);
            --color-complete: var(--color-forest-green);
            --color-error: var(--color-accent-red);
            
            /* Layout */
            --transition: all 0.3s ease;
            --border-radius: 8px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: var(--color-dark);
            overflow: hidden;
        }

        /* ===================================================================
           LAYOUT CONTAINER
           =================================================================== */
        #aladin-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ===================================================================
           HEADER
           =================================================================== */
        #aladin-header {
            background: linear-gradient(135deg, var(--color-light) 0%, #f1f5f9 100%);
            border-bottom: 1.5px solid var(--color-border);
            padding: 0.5rem 1.5rem;
            min-height: 50px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: flex-end;
            gap: 1rem;
        }

        .logo-hero-black {
            font-size: 3.5rem;
            font-family: system-ui, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        .logo-hero-black .thin {
            font-weight: 60;
            color: #000000;
        }

        .logo-hero-black .bold {
            font-weight: 1100;
            color: #000000;
        }

        .header-tagline {
            font-size: 1.1rem;
            color: var(--color-secondary);
            font-weight: 400;
            margin: 0;
            padding-bottom: 0.3rem;
            line-height: 1.2;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.2rem;
            margin-left: auto;
        }

        .status-sequence {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: flex-end;
        }

        .status-item, .agent-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            min-width: 45px;
            height: 40px;
        }

        .status-label {
            font-size: 11px;
            color: var(--color-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-indicator, .agent-status-dot {
            font-size: 0.9rem;
            transition: var(--transition);
            color: var(--color-idle);
        }

        .status-item.ready .status-indicator {
            color: var(--color-ready);
        }

        .status-item.processing .status-indicator {
            color: var(--color-processing);
            animation: pulse 1.5s infinite;
        }

        .status-item.error .status-indicator {
            color: var(--color-error);
        }

        .agent-item.ready .agent-status-dot {
            color: var(--color-ready);
        }

        .agent-item.processing .agent-status-dot {
            color: var(--color-processing);
            animation: pulse 1.5s infinite;
        }

        .agent-item.complete .agent-status-dot {
            color: var(--color-success);
        }

        .agent-item.error .agent-status-dot {
            color: var(--color-error);
        }

        .agent-item.idle .agent-status-dot {
            color: var(--color-idle);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .session-id-minimal {
            font-size: 10px;
            color: #a0a0a0;
            font-weight: 400;
            margin-top: 0.1rem;
            text-align: right;
        }

        /* ===================================================================
           MAIN CONTENT - 30% CHAT + 70% RIGHT PANEL
           =================================================================== */
        #aladin-main {
            display: flex;
            height: calc(100vh - 60px);
            gap: 0;
            overflow: hidden;
        }

        /* Chat Panel - 30% */
        #chat-panel {
            width: 30%;
            min-width: 320px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 1px solid var(--color-border);
            overflow: hidden;
        }

        /* Right Panel - 70% */
        #right-panel {
            width: 70%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===================================================================
           CHART SECTION - 60% WITH SCROLL
           =================================================================== */
        #chart-section {
            height: 65%;
            overflow-y: visible;  /* Changed from auto */
            overflow-x: hidden;
            padding: 0.5rem;
            border-bottom: 4px solid var(--color-border);
            background: white;
        }

        #chart-section::-webkit-scrollbar {
            width: 8px;
        }

        #chart-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #chart-section::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 2px;
        }

        #chart-section::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        #chart-container {
            width: 100%;
            display: none;
        }

        #chart-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-secondary);
        }

        #chart-placeholder svg {
            width: 150px;
            height: 150px;
            margin-bottom: 0.2rem;
            opacity: 0.3;
        }

        /* ===================================================================
           ANALYSIS SECTION - 40% WITH SCROLL
           =================================================================== */
        #analysis-section {
            height: 35%;
            overflow-y: auto;
            padding: 0.5rem;
            background: #f8f9fa;
            background: white !important;

        }

        #analysis-section::-webkit-scrollbar {
            width: 8px;
        }

        #analysis-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #analysis-section::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        #analysis-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-secondary);
            text-align: center;
        }

        #analysis-summary-container {
            display: none;
        }

        .analysis-summary {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: white;
            border-radius: 4px;
            border-left: 4px solid var(--color-primary);
        }

        .analysis-summary h3 {
            margin: 0 0 0.75rem 0;
            font-size: 1.1rem;
            color: var(--color-primary);
        }

        .analysis-details {
            margin-top: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
        }

        .analysis-details h4 {
            margin: 1rem 0 0.5rem 0;
            font-size: 1rem;
            color: #333;
        }

        .analysis-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            color: #444;
        }

        /* ===================================================================
           CHAT SECTION
           =================================================================== */
        .chat-section {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 0;
            background: white;
        }

        .chat-message {
            padding: 0.875rem 1.125rem;
            border-radius: var(--border-radius);
            margin-bottom: 0.5rem;
            font-size: 15px;
            line-height: 1.5;
            max-width: 85%;
            animation: fadeInUp 0.3s ease;
            word-wrap: break-word;
            position: relative;
            white-space: pre-wrap;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.user {
            background: linear-gradient(135deg, var(--color-primary), #e11d48);
            color: white;
            margin-left: auto;
            margin-right: 0;
            box-shadow: 0 2px 8px rgba(220, 53, 69, 0.3);
            border-bottom-right-radius: 4px;
            text-align: left;
        }

        .chat-message.assistant {
            background: rgba(248, 249, 250, 0.9);
            border: 1px solid rgba(233, 236, 239, 0.8);
            margin-left: 0;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-bottom-left-radius: 4px;
        }

        .chat-message.system {
            background: rgba(248, 249, 250, 0.9);
            border: 1px solid rgba(233, 236, 239, 0.8);
            margin-left: 0;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ===================================================================
           INPUT SECTION
           =================================================================== */
        .input-section {
            border-top: 1px solid var(--color-border);
            padding: 1rem;
            background: var(--color-light);
            flex-shrink: 0;
            min-height: 80px;
            width: 100%;
            box-sizing: border-box;
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        #chat-input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--color-border);
            border-radius: var(--border-radius);
            font-size: 15px;
            font-family: inherit;
            color: var(--color-charcoal);
            background: white;
            resize: none;
            min-height: 45px;
            max-height: 120px;
            overflow-y: auto;
            transition: border-color 0.3s ease;
        }

        #chat-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        #send-button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--color-primary), #e11d48);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        #send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        #send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        #send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===================================================================
           STATUS UPDATES (TOASTS)
           =================================================================== */
        .status-update {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transition: opacity 0.3s;
        }

        .status-info {
            background: #007bff;
        }

        .status-success {
            background: #28a745;
        }

        .status-error {
            background: #dc3545;
        }

        .status-warning {
            background: #ffc107;
            color: #333;
        }

        /* ===================================================================
           RESPONSIVE DESIGN
           =================================================================== */
        @media (max-width: 968px) {
            #aladin-main {
                flex-direction: column;
            }
            
            #chat-panel {
                width: 100%;
                max-width: none;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                height: 40vh;
            }

            #right-panel {
                width: 100%;
            }
            
            #chart-section {
                height: 50vh;
            }
            
            #analysis-section {
                height: 50vh;
            }
                    
            .header-content {
                flex-direction: column;
                gap: 0.8rem;
                align-items: center;
            }
            
            .header-left {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 0.3rem;
            }
            
            .header-right {
                align-items: center;
                width: 100%;
                margin-left: 0;
            }
            
            .status-sequence {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }
            
            .status-label {
                font-size: 10px;
            }
            
            .session-id-minimal {
                margin-top: 0.3rem;
            }

            .logo-hero-black {
                font-size: 2.8rem;
            }
            
            .input-section {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="aladin-container">
        <!-- ===================================================================
             HEADER
             =================================================================== -->
        <header id="aladin-header">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="logo-hero-black">
                        <span class="thin">al</span><span class="bold">ai</span><span class="thin">din</span>
                    </h1>
                    <div class="header-tagline">
                        The Ai genie for financial markets
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="status-sequence">
                        <div class="status-item" data-agent="system">
                            <span class="status-label">Session</span>
                            <span id="system-status" class="status-indicator">&#9679;</span>
                        </div>
                        <div class="agent-item" data-agent="data">
                            <span class="status-label">Data</span>
                            <span class="agent-status-dot" id="data-status">&#9679;</span>
                        </div>
                        <div class="agent-item" data-agent="tools">
                            <span class="status-label">Tools</span>
                            <span class="agent-status-dot" id="tools-status">&#9679;</span>
                        </div>
                        <div class="agent-item" data-agent="analysis">
                            <span class="status-label">Analysis</span>
                            <span class="agent-status-dot" id="analysis-status">&#9679;</span>
                        </div>
                    </div>
                    
                    <div class="session-id-minimal">
                        <span id="session-info">ID: <span id="session-id">--</span></span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===================================================================
             MAIN CONTENT - 30% CHAT + 70% RIGHT PANEL
             =================================================================== -->
        <main id="aladin-main">
            <!-- Chat Panel (Left - 30%) -->
            <section id="chat-panel" class="panel">
                <div id="chat-history" class="chat-section">
                    <!-- Messages will be added here dynamically -->
                </div>

                <div id="chat-input-section" class="input-section">
                    <div class="input-container">
                        <textarea id="chat-input" placeholder="Ask me to analyze a stock (e.g., 'analyze TCS')..." rows="1"></textarea>
                        <button id="send-button">Send</button>
                    </div>
                </div>
            </section>

            <!-- Right Panel (70%) -->
            <section id="right-panel">
                <!-- Chart Section (60% of right panel) -->
                <div id="chart-section">
                    <div id="chart-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                        <p>Charts will appear here after analysis</p>
                    </div>
                    
                    <div id="chart-container">
                        <!-- Image-based chart will be inserted here by aladin.js -->
                    </div>
                </div>

                <!-- Analysis Section (40% of right panel) -->
                <div id="analysis-section">
                    <div id="analysis-placeholder">
                        <p>📊 Analysis insights will appear here</p>
                    </div>
                    <div id="analysis-summary-container">
                        <!-- Analysis data will be inserted here by aladin.js -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ===================================================================
         LOAD EXTERNAL JAVASCRIPT
         =================================================================== -->
    <script src="/static/js/aladin.js"></script>
</body>
</html>
