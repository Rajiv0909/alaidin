<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaidin — Owner Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
:root { --k:#111111; --y:#F5C518; --g:#666666; --r:#ef4444; }
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f8f8f6;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card {
  background:#fff;
  border:2px solid var(--k);
  border-radius:4px;
  width:360px;
  padding:40px 36px;
  text-align:center;
}
.logo {
  font-family:'Nunito',system-ui,sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.5px;
  margin-bottom:28px;
}
.logo span { color:var(--y); }
.card h1 {
  font-size:22px;
  font-weight:800;
  letter-spacing:-0.8px;
  margin-bottom:10px;
}
.card p {
  font-size:14px;
  color:var(--g);
  line-height:1.65;
  margin-bottom:32px;
}
.btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:14px;
  background:var(--k);
  color:#fff;
  border:none;
  border-radius:3px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  transition:opacity .15s;
}
.btn:hover { opacity:.85; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.note {
  margin-top:18px;
  font-size:12px;
  color:#bbb;
  line-height:1.7;
}
.alert {
  padding:10px 14px;
  border-radius:3px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
}
.alert-error { background:#fee2e2; color:#991b1b; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>ala</span>idin</div>
  <h1>Owner Login</h1>
  <p>Sign in with your Zerodha account to access the strategy console and live P&L.</p>

  <div class="alert alert-error" id="alert"></div>

  <a class="btn" id="login-btn" href="/api/auth/kite/owner-login">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8.5" stroke="#fff" stroke-width="1"/><path d="M9 4.5C7 4.5 5.5 6 5.5 8C5.5 10 7 11.5 9 11.5C11 11.5 12.5 10 12.5 8C12.5 6 11 4.5 9 4.5Z" fill="#fff"/><path d="M3 15C3.5 12.5 6 11.5 9 11.5C12 11.5 14.5 12.5 15 15" stroke="#fff" stroke-width="1" stroke-linecap="round"/></svg>
    Connect with Zerodha
  </a>
  <p class="note">WI0733 only. Daily re-auth refreshes the trading token.</p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    const al = document.getElementById('alert');
    const msg = { not_owner: 'This Zerodha account is not authorized as owner.', missing_token: 'Authentication failed — missing token. Please try again.' };
    al.textContent = msg[params.get('error')] || 'Login failed: ' + params.get('error');
    al.style.display = 'block';
  }
</script>
</body>
</html>
